# Rule: hotfix-checks
#
# Purpose: gates every PR into master on three checks, run in order:
#
#   1. check-branch-name    - the source branch must start with hotfix/
#                              (case-insensitive: hotfix/, Hotfix/, HOTFIX/
#                              all count).
#   2. check-jira-priority  - extracts a Jira ticket key (e.g. PROD-1234 -
#                              any project, case-insensitive) first from the
#                              PR title, falling back to the branch name.
#                              Looks the ticket up in Jira and requires:
#                                - the "Request Prioirty" custom field (yes,
#                                  that's the real field name/spelling in
#                                  this Jira instance) = "P1"
#                                - the issue's labels include "hotfix"
#                                  (case-insensitive)
#   3. hotfix-merge-approval - once the above pass, requires an APPROVED
#                              review on the PR from someone listed in the
#                              HOTFIX_APPROVERS repo variable (comma-
#                              separated GitHub usernames). Re-runs whenever
#                              a review is submitted (pull_request_review
#                              trigger below), so approving the PR flips
#                              this check to green without needing a new
#                              push.
#
# This intentionally does NOT use a GitHub Environment with "required
# reviewers" for step 3 - that feature only enforces required reviewers on
# PUBLIC repos on Free/Pro/Team plans. On a private repo without GitHub
# Enterprise Cloud, the reviewer/wait-timer options are unavailable, so it
# couldn't actually gate anything. The HOTFIX_APPROVERS variable + review-
# check approach works on any plan.
#
# Required repo config (Settings -> Secrets and variables -> Actions):
#   - Variable JIRA_USER_EMAIL   - email of the Jira account that owns the
#                                   JIRA_API_TOKEN secret below.
#   - Secret   JIRA_API_TOKEN    - an API token for that Jira account
#                                   (create one at
#                                   https://id.atlassian.com/manage-profile/security/api-tokens)
#   - Variable HOTFIX_APPROVERS  - comma-separated GitHub usernames
#                                   authorized to clear a hotfix PR to merge
#                                   (e.g. "muhammadanees-ai,arslantabassum").
#
# NOTE: the standard Jira "Priority" field isn't used here - "Request
# Prioirty" (customfield_10795) is the field this Jira instance's PROD
# project actually carries priority on. Update JIRA_PRIORITY_FIELD below if
# that ever changes.
#
# `check-branch-name`, `check-jira-priority`, and `hotfix-merge-approval`
# should be added as required status checks on master (Settings -> Branches).
#
name: Hotfix Checks

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, ready_for_review, edited]
  pull_request_review:
    types: [submitted]

jobs:
  check-branch-name:
    name: check-branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Validate hotfix branch naming
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          HEAD_LOWER=$(echo "$HEAD_REF" | tr '[:upper:]' '[:lower:]')
          if [[ "$HEAD_LOWER" =~ ^hotfix/ ]]; then
            echo "'$HEAD_REF' matches the required hotfix/* naming convention."
          else
            echo "::error::Branch '$HEAD_REF' does not start with hotfix/ - required naming convention for a PR into master in this repo."
            exit 1
          fi

  check-jira-priority:
    name: check-jira-priority
    needs: check-branch-name
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      JIRA_BASE_URL: https://tilemountain.atlassian.net
      JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # See the note above the file header - verify this applies to
      # whichever Jira project your hotfix tickets actually use.
      JIRA_PRIORITY_FIELD: customfield_10795
    steps:
      - name: Extract Jira ticket from PR title or branch name
        id: ticket
        run: |
          echo "PR title: $PR_TITLE"
          echo "Branch name: $HEAD_REF"
          # Any Jira project key, case-insensitive (PROD-1234, QA-1093, ...)
          TICKET=$(grep -ioE '[a-z][a-z0-9]*-[0-9]+' <<< "$PR_TITLE" | head -n1 | tr '[:lower:]' '[:upper:]')
          if [[ -z "$TICKET" ]]; then
            TICKET=$(grep -ioE '[a-z][a-z0-9]*-[0-9]+' <<< "$HEAD_REF" | head -n1 | tr '[:lower:]' '[:upper:]')
            [[ -n "$TICKET" ]] && echo "No ticket in the PR title - using the one found in the branch name instead."
          fi

          if [[ -z "$TICKET" ]]; then
            echo "::error::No Jira ticket key found in the PR title or branch name (expected something like PROD-1234)."
            exit 1
          fi

          echo "Found ticket reference: $TICKET"
          echo "key=$TICKET" >> "$GITHUB_OUTPUT"

      - name: Check Jira priority and hotfix label
        env:
          TICKET_KEY: ${{ steps.ticket.outputs.key }}
        run: |
          if [[ -z "$JIRA_API_TOKEN" ]]; then
            echo "::error::Missing JIRA_API_TOKEN repo secret - cannot verify $TICKET_KEY."
            exit 1
          fi
          if [[ -z "$JIRA_USER_EMAIL" ]]; then
            echo "::error::Missing JIRA_USER_EMAIL repo variable - cannot authenticate to Jira."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TICKET_KEY?fields=$JIRA_PRIORITY_FIELD,labels")

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "::error::Could not fetch $TICKET_KEY from Jira (HTTP $HTTP_STATUS)."
            cat response.json || true
            exit 1
          fi

          PRIORITY=$(jq -r ".fields[\"$JIRA_PRIORITY_FIELD\"].value // empty" response.json)
          HAS_HOTFIX_LABEL=$(jq -r '[.fields.labels[]? | ascii_downcase] | any(. == "hotfix")' response.json)

          echo "Ticket: $TICKET_KEY"
          echo "Request Prioirty: ${PRIORITY:-<none>}"
          echo "Has 'hotfix' label: $HAS_HOTFIX_LABEL"

          if [[ "$PRIORITY" != "P1" ]]; then
            echo "::error::$TICKET_KEY is not P1 (Request Prioirty = '${PRIORITY:-<none>}')."
            exit 1
          fi

          if [[ "$HAS_HOTFIX_LABEL" != "true" ]]; then
            echo "::error::$TICKET_KEY does not have the 'hotfix' label."
            exit 1
          fi

          echo "$TICKET_KEY is P1 and labelled 'hotfix'."

  hotfix-merge-approval:
    name: hotfix-merge-approval
    needs: check-jira-priority
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Require approval from an authorized hotfix approver
        env:
          GH_TOKEN: ${{ github.token }}
          APPROVERS: ${{ vars.HOTFIX_APPROVERS }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ -z "$APPROVERS" ]]; then
            echo "::error::HOTFIX_APPROVERS repo variable is not set - cannot verify an authorized approver."
            exit 1
          fi

          APPROVED_BY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json reviews \
            --jq '[.reviews[] | select(.state=="APPROVED")] | .[-1].author.login // empty')

          if [[ -z "$APPROVED_BY" ]]; then
            echo "::error::No approving review yet from an authorized hotfix approver ($APPROVERS). Ask one of them to review and approve this PR - this check re-runs automatically once they do."
            exit 1
          fi

          if [[ ",$APPROVERS," != *",$APPROVED_BY,"* ]]; then
            echo "::error::$APPROVED_BY approved, but is not in the authorized hotfix-approver list ($APPROVERS)."
            exit 1
          fi

          echo "Approved by $APPROVED_BY - an authorized hotfix approver."
