# Rule: hotfix-jira-priority-check
#
# Purpose: a hotfix is only allowed to merge into master if the PROD ticket
# referenced in the PR title is genuinely a P1 in Jira and has been labelled
# "hotfix". This is a second, independent gate alongside
# hotfix-branch-name-check.yml (per the pattern documented in that file:
# each rule lives in its own workflow so it can be enabled/disabled and
# tested on its own). Add this job's name as an additional required status
# check in branch protection once it's green a few times.
#
# What it checks, in order:
#   1. Exempt the normal "staging" release branch, same as the branch-name
#      check - this rule only exists to gate hotfixes, not the regular
#      staging -> master release flow.
#   2. Extract a PROD-<number> ticket key from the PR title (e.g.
#      "Hotfix: fix checkout crash (PROD-4821)" -> PROD-4821). Fails if no
#      PROD ticket is referenced.
#   3. Looks the ticket up in Jira and checks two fields:
#        - the "Request Prioirty" custom field (yes, that's really how it's
#          spelled in this Jira instance - customfield_10795) must be "P1".
#          NOTE: the standard Jira "Priority" field is NOT usable here - it
#          has been removed from the PROD project's field configuration and
#          is not readable via the API for PROD issues. "Request Prioirty"
#          is the field PROD tickets actually carry priority on.
#        - the issue's labels must include "hotfix" (case-insensitive).
#      Both must be true for the check to pass.
#
# Required repo secret (Settings -> Secrets and variables -> Actions):
#   JIRA_API_TOKEN  an API token for the Jira account below
#     (create one at https://id.atlassian.com/manage-profile/security/api-tokens)
#
# Jira domain and account email are hardcoded below (not secrets, since
# they're not sensitive on their own) — only the API token is a secret.
#
# If the custom field ID (customfield_10795) or the priority option values
# (P1/P2/P3) ever change in Jira, update the JIRA_PRIORITY_FIELD env var and
# the comparison below to match.
name: Hotfix Jira Priority Check
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, edited]
jobs:
  check-jira-priority:
    name: check-jira-priority
    runs-on: ubuntu-latest
    # Only enforce this rule for PRs actually targeting master
    if: github.event.pull_request.base.ref == 'master'
    env:
      HEAD_REF: ${{ github.head_ref }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      JIRA_BASE_URL: https://tilemountain.atlassian.net
      JIRA_USER_EMAIL: bilal.aslam@tilemountain.co.uk
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # The "Request Prioirty" custom field ID in this Jira instance (misspelling is intentional - matches the real field name)
      JIRA_PRIORITY_FIELD: customfield_10795
    steps:
      - name: Exempt the staging release branch
        id: exempt
        run: |
          if [[ "$HEAD_REF" == "staging" ]]; then
            echo "✅ '$HEAD_REF' is the staging release branch — exempt from the Jira priority check by design."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract PROD ticket from PR title
        if: steps.exempt.outputs.skip == 'false'
        id: ticket
        run: |
          echo "PR title: $PR_TITLE"
          # Looks for PROD-<number> anywhere in the title, e.g. "PROD-4821" or "[PROD-4821]"
          TICKET=$(grep -oE '[Pp][Rr][Oo][Dd]-[0-9]+' <<< "$PR_TITLE" | head -n1 | tr '[:lower:]' '[:upper:]')
          if [[ -z "$TICKET" ]]; then
            echo "❌ No PROD-<number> ticket reference found in the PR title."
            echo "Expected something like: 'Hotfix: fix checkout crash (PROD-4821)'"
            exit 1
          fi
          echo "✅ Found ticket reference: $TICKET"
          echo "key=$TICKET" >> "$GITHUB_OUTPUT"

      - name: Check Jira priority and label
        if: steps.exempt.outputs.skip == 'false'
        env:
          TICKET_KEY: ${{ steps.ticket.outputs.key }}
        run: |
          if [[ -z "$JIRA_API_TOKEN" ]]; then
            echo "❌ Missing JIRA_API_TOKEN repo secret - cannot verify $TICKET_KEY."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TICKET_KEY?fields=$JIRA_PRIORITY_FIELD,labels")

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "❌ Could not fetch $TICKET_KEY from Jira (HTTP $HTTP_STATUS). Check the ticket key and Jira credentials."
            cat response.json || true
            exit 1
          fi

          PRIORITY=$(jq -r ".fields[\"$JIRA_PRIORITY_FIELD\"].value // empty" response.json)
          HAS_HOTFIX_LABEL=$(jq -r '[.fields.labels[]? | ascii_downcase] | any(. == "hotfix")' response.json)

          echo "Ticket: $TICKET_KEY"
          echo "Request Prioirty: ${PRIORITY:-<none>}"
          echo "Has 'hotfix' label: $HAS_HOTFIX_LABEL"

          if [[ "$PRIORITY" != "P1" ]]; then
            echo "❌ $TICKET_KEY is not P1 (Request Prioirty = '${PRIORITY:-<none>}')."
            exit 1
          fi

          if [[ "$HAS_HOTFIX_LABEL" != "true" ]]; then
            echo "❌ $TICKET_KEY does not have the 'hotfix' label."
            exit 1
          fi

          echo "✅ $TICKET_KEY is P1 and labelled 'hotfix' - hotfix check passed."
