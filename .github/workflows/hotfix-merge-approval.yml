# Rule: hotfix-merge-approval
#
# Purpose: the third gate of the hotfix-to-master flow (see hotfix-
# checks.yml for the first two - branch naming and Jira P1/hotfix-label).
# Requires an APPROVED review on the PR from someone listed in the
# HOTFIX_APPROVERS repo variable (comma-separated GitHub usernames).
#
# Deliberately kept in its OWN workflow file, triggered ONLY by
# pull_request_review. See the note at the top of hotfix-checks.yml for why:
# a job that responds to two different trigger events (pull_request AND
# pull_request_review) ends up with two separate, independently-tracked
# required-check contexts - one of which never gets a chance to re-run
# after approval, permanently blocking merge. Keeping this job in a file
# that ONLY ever fires on pull_request_review means it has exactly one
# context, which starts out "pending" (blocking merge, as intended) and
# updates cleanly every time a review is submitted.
#
# Required repo config (Settings -> Secrets and variables -> Actions):
#   - Variable HOTFIX_APPROVERS - comma-separated GitHub usernames
#                              authorized to clear a hotfix PR to merge
#                              (e.g. "muhammadanees-ai,arslantabassum").
#
# `hotfix-merge-approval` should be added as a required status check on
# master (Settings -> Branches), alongside check-branch-name and
# check-jira-priority from hotfix-checks.yml.
#
name: Hotfix Merge Approval

on:
  pull_request_review:
    types: [submitted]

jobs:
  hotfix-merge-approval:
    name: hotfix-merge-approval
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Require approval from an authorized hotfix approver
        env:
          GH_TOKEN: ${{ github.token }}
          APPROVERS: ${{ vars.HOTFIX_APPROVERS }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ -z "$APPROVERS" ]]; then
            echo "::error::HOTFIX_APPROVERS repo variable is not set - cannot verify an authorized approver."
            exit 1
          fi

          APPROVED_BY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json reviews \
            --jq '[.reviews[] | select(.state=="APPROVED")] | .[-1].author.login // empty')

          if [[ -z "$APPROVED_BY" ]]; then
            echo "::error::No approving review yet from an authorized hotfix approver ($APPROVERS). Ask one of them to review and approve this PR - this check re-runs automatically once they do."
            exit 1
          fi

          if [[ ",$APPROVERS," != *",$APPROVED_BY,"* ]]; then
            echo "::error::$APPROVED_BY approved, but is not in the authorized hotfix-approver list ($APPROVERS)."
            exit 1
          fi

          echo "Approved by $APPROVED_BY - an authorized hotfix approver."
